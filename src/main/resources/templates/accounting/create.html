<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/erpForm}">
<head>
    <title>Invoice - New</title>
    <script th:src="@{/js/post.js}" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("header-route").innerHTML = `<p>Create Invoice / <span class="active">New</span></p>`;
        });
    </script>
</head>
<body>
    <main layout:fragment="content">
        <form id="formData" th:action="@{/invoice/add}" method="post" class="form-card">
            <div class="form-header"></div>
            <div class="form-body">
                <div th:replace="~{fragments/form-input :: form-input(id='invoiceNumber', name='invoiceNumber', type='text', label='Invoice Ref*')}" />
                <div th:replace="~{fragments/form-input :: form-input(id='customerName', name='customerName', type='text', label='Customer Name*')}" />
                <div th:replace="~{fragments/form-input :: form-input(id='amount', name='amount', type='number', label='Amount*')}" />
                <div th:replace="~{fragments/form-input :: form-input(id='dueDate', name='dueDate', type='date', label='Due Date*')}" />
            </div>
            <div class="form-footer">
                <button type="submit" class="button button-accent form-button">
                    <div id="plus-icon" class="icon-wrapper"></div>
                    <p>Add Invoice</p>
                </button>
                <a th:href="@{/accounting/}">
                    <button type="button" class="button button-outline form-button">
                        <div id="cancel-icon" class="icon-wrapper"></div>
                        <p>Cancel Operation</p>
                    </button>
                </a>
            </div>
        </form>
    </main>
</body>
</html>
